<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcriptor de Videos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 760px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(90deg, #ff0050, #ff6b00, #ffcd00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    input[type="url"] {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e8e8e8;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="url"]:focus { border-color: #ff0050; }
    input[type="url"]::placeholder { color: #555; }

    button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #ff0050, #ff6b00);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    button:hover:not(:disabled) { opacity: 0.88; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner {
      display: none;
      text-align: center;
      padding: 40px 0;
      color: #888;
    }

    .spinner.active { display: block; }

    .spinner svg {
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      display: none;
      background: #2a1a1a;
      border: 1px solid #6b2222;
      border-radius: 8px;
      padding: 14px 18px;
      color: #f87171;
      margin-bottom: 24px;
    }

    .error-box.active { display: block; }

    .results { display: none; }
    .results.active { display: block; }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .card-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 10px;
    }

    .card-text {
      font-size: 0.97rem;
      line-height: 1.7;
      color: #ddd;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 360px;
      overflow-y: auto;
    }

    .summary-card .card-label { color: #ffcd00; }
    .transcription-card .card-label { color: #60a5fa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Transcriptor de Videos</h1>
    <p class="subtitle">Pega una URL de YouTube o TikTok para obtener la transcripción completa y un resumen.</p>

    <div class="input-row">
      <input type="url" id="urlInput" placeholder="https://www.youtube.com/watch?v=... o https://www.tiktok.com/..." />
      <button id="submitBtn" onclick="submitUrl()">Transcribir</button>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="spinner" id="spinner">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ff0050" stroke-width="2" stroke-linecap="round">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
      <p>Descargando y transcribiendo el video…<br><span style="font-size:0.85rem">Esto puede tardar unos minutos.</span></p>
    </div>

    <div class="results" id="results">
      <div class="card summary-card">
        <div class="card-label">Resumen</div>
        <div class="card-text" id="summaryText"></div>
      </div>
      <div class="card transcription-card">
        <div class="card-label">Transcripción completa</div>
        <div class="card-text" id="transcriptionText"></div>
      </div>
    </div>
  </div>

  <script>
    async function submitUrl() {
      const url = document.getElementById("urlInput").value.trim();
      const errorBox = document.getElementById("errorBox");
      const spinner = document.getElementById("spinner");
      const results = document.getElementById("results");
      const btn = document.getElementById("submitBtn");

      errorBox.classList.remove("active");
      results.classList.remove("active");

      if (!url) {
        showError("Por favor ingresa una URL.");
        return;
      }

      btn.disabled = true;
      spinner.classList.add("active");

      try {
        const res = await fetch("/transcribe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          showError(data.error || "Ocurrió un error inesperado.");
          return;
        }

        document.getElementById("summaryText").textContent = data.summary;
        document.getElementById("transcriptionText").textContent = data.transcription;
        results.classList.add("active");
      } catch (err) {
        showError("Error de conexión. Intenta nuevamente.");
      } finally {
        spinner.classList.remove("active");
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const box = document.getElementById("errorBox");
      box.textContent = msg;
      box.classList.add("active");
    }

    document.getElementById("urlInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") submitUrl();
    });
  </script>
</body>
</html>
